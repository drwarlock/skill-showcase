{{- define "base-library.rolebinding" -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "base-library.fullname" . }}-rolebinding
  labels:
    {{- include "base-library.labels" . | nindent 4 }}
    {{- with .Values.application.rolebinding.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "base-library.annotations" . | nindent 4 }}
    {{- with .Values.application.rolebinding.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "base-library.serviceAccountName" . }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: {{ include "base-library.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
{{- end -}}