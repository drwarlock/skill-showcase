{{- define "base-library.deployment" -}}
{{- include "base-library.deployment-api-version" . }}
{{- include "base-library.deployment-kind" . }}
metadata:
  name: {{ include "base-library.fullname" . }}
  labels:
    {{- include "base-library.labels" . | nindent 4 }}
    {{- with .Values.application.deployment.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "base-library.annotations" . | nindent 4 }}
    {{- with .Values.application.deployment.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.application.deployment.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "base-library.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "base-library.selectorLabels" . | nindent 8 }}
        {{- include "base-library.datadogLabels" . | nindent 8 }}
        {{- with .Values.application.deployment.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "base-library.annotations" . | nindent 8 }}
        {{- include "base-library.podAnnotations" . | nindent 8 }}
        {{- include "base-library.datadogAnnotations" . | nindent 8 }}
        {{- with .Values.application.deployment.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.application.deployment.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.application.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.application.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.application.deployment.affinity.endabled}}
      {{- include "base-library.deployment-affinity" . }}
      {{- else }}
      {{- with .Values.application.deployment.affinity }}
      {{- if not (haskey . "endabled") }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- end }}
      # TODO: Add support for rollouts
      # {{- if values.application.rollouts.enabled }}
      # strategy:
      #   {{- include "base-library.deployment-rollout-strategy" . | nindent 8 }}
      # {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.application.image.repository }}:{{ .Values.application.image.tag }}"
          imagePullPolicy: {{ .Values.application.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.application.containerPort }}
              protocol: TCP
          env:
            {{- with .Values.application.deployment.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            limits:
              cpu: {{ .Values.application.resources.limits.cpu }}
              memory: {{ .Values.application.resources.limits.memory }}
            requests:
              cpu: {{ .Values.application.resources.requests.cpu }}
              memory: {{ .Values.application.resources.requests.memory }}
          {{- if .Values.application.deployment.command }}
          command: {{ toJson .Values.application.deployment.command }}
          {{- end }}
          {{- if .Values.application.deployment.args }}
          args: {{ toJson .Values.application.deployment.args }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.application.deployment.livenessProbe.path | default "/liveness" }}
              port: {{ .Values.application.deployment.livenessProbe.port | default "http" }}
            timeoutSeconds: {{ .Values.application.deployment.livenessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.application.deployment.livenessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.application.deployment.livenessProbe.failureThreshold | default 3 }}
            periodSeconds: {{ .Values.application.deployment.livenessProbe.periodSeconds | default 10 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.application.deployment.readinessProbe.path | default "/readiness" }}
              port: {{ .Values.application.deployment.readinessProbe.port | default "http" }}
            timeoutSeconds: {{ .Values.application.deployment.readinessProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.application.deployment.readinessProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.application.deployment.readinessProbe.failureThreshold | default 3 }}
            periodSeconds: {{ .Values.application.deployment.readinessProbe.periodSeconds | default 10 }}
          startupProbe:
            httpGet:
              path: {{ .Values.application.deployment.startupProbe.path | default "/liveness" }}
              port: {{ .Values.application.deployment.startupProbe.port | default "http" }}
            timeoutSeconds: {{ .Values.application.deployment.startupProbe.timeoutSeconds | default 1 }}
            successThreshold: {{ .Values.application.deployment.startupProbe.successThreshold | default 1 }}
            failureThreshold: {{ .Values.application.deployment.startupProbe.failureThreshold | default 3 }}
            periodSeconds: {{ .Values.application.deployment.startupProbe.periodSeconds | default 10 }}
          envFrom:
          volumeMounts:
      initContainers:
      volumes:
      nodeSelector:
      affinity:
      tolerations:
{{- end -}}