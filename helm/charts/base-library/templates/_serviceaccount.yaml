{{- define "base-library.serviceAccount" -}}
{{- if .Values.application.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "base-library.serviceAccountName" . }}
  labels:
    {{- include "base-library.labels" . | nindent 4 }}
    {{- with .Values.application.serviceAccount.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- include "base-library.annotations" . | nindent 4 }}
    {{- with .Values.application.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
{{- end -}}